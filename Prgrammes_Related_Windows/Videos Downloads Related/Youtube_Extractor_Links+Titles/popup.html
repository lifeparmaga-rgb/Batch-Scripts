<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<title>YT Link Extractor</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0c0c12;
    --surface: #13131c;
    --border: #1e1e30;
    --accent: #ff0040;
    --accent2: #ff6b35;
    --green: #00ff88;
    --text: #dde0f5;
    --muted: #4a4a68;
    --mono: 'Share Tech Mono', monospace;
    --arabic: 'Tajawal', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 380px;
    min-height: 520px;
    background: var(--bg);
    color: var(--text);
    font-family: var(--arabic);
    position: relative;
    overflow-x: hidden;
  }

  /* grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,0,64,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,0,64,.03) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, #11111a 0%, #1a0a0f 100%);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-icon {
    width: 34px; height: 34px;
    background: var(--accent);
    border-radius: 8px;
    display: grid; place-items: center;
    box-shadow: 0 0 16px rgba(255,0,64,.5);
    flex-shrink: 0;
    animation: glow 2s ease-in-out infinite;
  }
  @keyframes glow {
    0%,100% { box-shadow: 0 0 16px rgba(255,0,64,.5); }
    50%      { box-shadow: 0 0 28px rgba(255,0,64,.9); }
  }
  .header-icon svg { width: 18px; height: 18px; fill: #fff; }
  .header-title {
    font-family: var(--mono);
    font-size: .85rem;
    letter-spacing: .1em;
    background: linear-gradient(90deg, #fff, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.2;
  }
  .header-sub {
    font-size: .65rem;
    color: var(--muted);
    font-family: var(--mono);
  }

  /* ── BODY ── */
  .body { padding: 16px; }

  /* auto-detect badge */
  .detect-badge {
    display: none;
    align-items: center;
    gap: 8px;
    background: rgba(0,255,136,.07);
    border: 1px solid rgba(0,255,136,.2);
    border-radius: 8px;
    padding: 8px 12px;
    margin-bottom: 12px;
    font-family: var(--mono);
    font-size: .72rem;
    color: var(--green);
    animation: fadeIn .3s ease both;
    cursor: pointer;
  }
  .detect-badge.show { display: flex; }
  .detect-badge:hover { background: rgba(0,255,136,.12); }
  .detect-dot {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: blink 1.2s ease infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none} }

  label {
    display: block;
    font-family: var(--mono);
    font-size: .68rem;
    color: var(--accent2);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: .78rem;
    outline: none;
    margin-bottom: 14px;
    transition: border-color .2s, box-shadow .2s;
    direction: ltr;
  }
  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(255,0,64,.15);
  }
  input[type="text"]::placeholder { color: var(--muted); }

  /* type indicator */
  .url-type {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: var(--mono);
    font-size: .68rem;
    padding: 3px 9px;
    border-radius: 999px;
    margin-bottom: 12px;
    border: 1px solid;
    opacity: 0;
    transition: opacity .3s;
  }
  .url-type.show { opacity: 1; }
  .url-type.shorts  { color: #ff6b35; border-color: rgba(255,107,53,.3); background: rgba(255,107,53,.08); }
  .url-type.playlist{ color: #7b8cde; border-color: rgba(123,140,222,.3); background: rgba(123,140,222,.08); }
  .url-type.channel { color: var(--green); border-color: rgba(0,255,136,.3); background: rgba(0,255,136,.08); }

  /* date filter */
  .filter-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-bottom: 6px;
  }
  .filter-row-2 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-bottom: 14px;
  }
  .fbtn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 4px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: .65rem;
    cursor: pointer;
    transition: all .15s;
    text-align: center;
  }
  .fbtn:hover { border-color: var(--accent2); color: var(--accent2); }
  .fbtn.active {
    background: rgba(255,0,64,.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  .custom-date-wrap { display: none; margin-bottom: 12px; }
  .custom-date-wrap.show { display: block; }
  input[type="date"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: .75rem;
    outline: none;
    direction: ltr;
    transition: border-color .2s;
  }
  input[type="date"]:focus { border-color: var(--accent); }

  /* extract button */
  .btn-go {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: var(--arabic);
    font-size: .95rem;
    font-weight: 700;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform .15s, box-shadow .2s;
    box-shadow: 0 4px 18px rgba(255,0,64,.4);
    letter-spacing: .04em;
    margin-bottom: 14px;
  }
  .btn-go:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(255,0,64,.6);
  }
  .btn-go:disabled { opacity: .45; cursor: not-allowed; }
  .btn-go .shine {
    position: absolute;
    top: -50%; left: -80%;
    width: 50%; height: 200%;
    background: rgba(255,255,255,.15);
    transform: skewX(-20deg);
    animation: shine 3s ease infinite;
  }
  @keyframes shine { 0%,100%{left:-80%} 50%{left:130%} }

  /* ── PROGRESS ── */
  #progressArea { display: none; margin-bottom: 14px; }
  #progressArea.show { display: block; }

  .prog-header {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: .68rem;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .prog-status { color: var(--green); }
  .prog-track {
    background: var(--surface);
    border-radius: 999px;
    height: 4px;
    overflow: hidden;
    border: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .prog-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 999px;
    width: 0%;
    transition: width .3s;
    box-shadow: 0 0 8px rgba(255,0,64,.5);
  }
  .prog-bar.ind {
    width: 35% !important;
    animation: ind 1.3s ease-in-out infinite;
  }
  @keyframes ind { 0%{margin-left:-35%} 100%{margin-left:110%} }

  .log-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    max-height: 90px;
    overflow-y: auto;
    font-family: var(--mono);
    font-size: .68rem;
    line-height: 1.8;
    color: var(--muted);
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .ll { display: block; }
  .ll.ok  { color: var(--green); }
  .ll.err { color: var(--accent); }
  .ll.inf { color: var(--accent2); }

  /* ── RESULTS ── */
  #resultsArea { display: none; }
  #resultsArea.show { display: block; animation: fadeIn .3s ease both; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 6px;
    text-align: center;
  }
  .stat-n {
    font-family: var(--mono);
    font-size: 1.2rem;
    color: var(--green);
    font-weight: bold;
    display: block;
  }
  .stat-l {
    font-size: .62rem;
    color: var(--muted);
    font-family: var(--mono);
    margin-top: 2px;
  }

  .preview {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    max-height: 100px;
    overflow-y: auto;
    font-family: var(--mono);
    font-size: .65rem;
    line-height: 1.9;
    color: #6a9fb5;
    direction: ltr;
    margin-bottom: 10px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .btn-dl {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 2px solid var(--green);
    border-radius: 10px;
    color: var(--green);
    font-family: var(--arabic);
    font-size: .9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    box-shadow: 0 0 14px rgba(0,255,136,.1);
    margin-bottom: 8px;
  }
  .btn-dl:hover {
    background: rgba(0,255,136,.1);
    box-shadow: 0 0 24px rgba(0,255,136,.3);
  }

  .hint {
    background: rgba(0,255,136,.04);
    border: 1px solid rgba(0,255,136,.12);
    border-radius: 8px;
    padding: 8px 10px;
    font-family: var(--mono);
    font-size: .65rem;
    color: var(--muted);
    direction: ltr;
    line-height: 1.7;
  }
  .hint span { color: var(--green); }

  /* error */
  .err-box {
    background: rgba(255,0,64,.07);
    border: 1px solid rgba(255,0,64,.25);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: .75rem;
    color: #ff6680;
    display: none;
    margin-bottom: 10px;
    font-family: var(--mono);
  }
  .err-box.show { display: block; animation: fadeIn .25s ease both; }

  /* divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 14px 0;
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
    </div>
    <div>
      <div class="header-title">YT LINK EXTRACTOR</div>
      <div class="header-sub">// جاهز لـ yt-dlp</div>
    </div>
  </div>

  <div class="body">

    <!-- Auto-detect badge -->
    <div class="detect-badge" id="detectBadge" title="اضغط لاستخدام هذا الرابط">
      <div class="detect-dot"></div>
      <span id="detectText">تم اكتشاف صفحة يوتيوب — اضغط لاستخدامها</span>
    </div>

    <!-- URL input -->
    <label>// رابط القناة / Shorts / Playlist</label>
    <input type="text" id="urlInput" placeholder="https://www.youtube.com/@channel/shorts"/>
    <div class="url-type" id="urlType"></div>

    <!-- Date filter -->
    <label>// فلترة التاريخ</label>
    <div class="filter-row">
      <button class="fbtn active" data-days="0">بدون فلترة</button>
      <button class="fbtn" data-days="7">آخر أسبوع</button>
      <button class="fbtn" data-days="30">آخر شهر</button>
    </div>
    <div class="filter-row-2">
      <button class="fbtn" data-days="90">3 شهور</button>
      <button class="fbtn" data-days="365">سنة</button>
      <button class="fbtn" data-days="custom">مخصص</button>
    </div>
    <div class="custom-date-wrap" id="customDateWrap">
      <input type="date" id="customDate"/>
    </div>

    <div class="err-box" id="errBox"></div>

    <!-- Extract button -->
    <button class="btn-go" id="goBtn" onclick="startExtract()">
      <span class="shine"></span>
      ⚡ استخرج اللينكات
    </button>

    <!-- Progress -->
    <div id="progressArea">
      <div class="prog-header">
        <span>// جاري الاستخراج</span>
        <span class="prog-status" id="progStatus">جاري...</span>
      </div>
      <div class="prog-track">
        <div class="prog-bar ind" id="progBar"></div>
      </div>
      <div class="log-box" id="logBox"></div>
    </div>

    <!-- Results -->
    <div id="resultsArea">
      <div class="divider"></div>
      <label>// النتائج</label>
      <div class="stats-row" id="statsRow"></div>
      <div class="preview" id="preview"></div>
      <button class="btn-dl" id="dlBtn">⬇ تحميل الملف النصي</button>
      <div class="hint" id="hint"></div>
    </div>

  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
